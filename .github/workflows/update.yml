name: 매주 식단 자동 업데이트

on:
  schedule:
    # 매주 월요일 아침 8시 (한국시간) 자동 실행
    - cron: '0 23 * * 0'
  workflow_dispatch: # Actions 탭에서 수동으로 버튼 눌러서 실행 가능하게 해줌

jobs:
  build:
    runs-on: ubuntu-latest

    # 레포지토리에 변경된 식단 파일을 저장할 권한 부여
    permissions:
      contents: write

    steps:
    - name: 레포지토리 코드 가져오기
      uses: actions/checkout@v3

    - name: 파이썬 설치하기
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: 필요한 파이썬 패키지 설치하기
      run: |
        python -m pip install --upgrade pip
        pip install requests beautifulsoup4

    - name: 식단 업데이트 파이썬 스크립트 실행!
      run: python update_menu.py

    - name: 업데이트된 식단 파일(JSON) 깃허브에 자동 저장(Push)
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add src/menuData.json
        git commit -m "🍱 식단 데이터 자동 업데이트 완료" || echo "No changes to commit"
        git push
